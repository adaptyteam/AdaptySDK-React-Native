name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag to publish under'
        required: true
        default: 'latest'
        type: choice
        options:
          - 'latest'
          - 'beta'
      dry-run:
        description: 'Perform a dry run (no actual publish)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  id-token: write  # Required for OIDC trusted publishing
  contents: read

jobs:
  guard:
    runs-on: ubuntu-24.04
    name: Verify a real publish is from a v* git tag
    steps:
      - name: Enforce v* tag for real publishes (dry runs are exempt)
        env:
          DRY_RUN: ${{ inputs.dry-run }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run — skipping the v* tag guard (any ref is allowed)."
            exit 0
          fi
          if [ "$REF_TYPE" != "tag" ]; then
            echo "::error::A real publish must be dispatched from a git tag, but ref_type is '$REF_TYPE' (ref_name: '$REF_NAME')."
            exit 1
          fi
          case "$REF_NAME" in
            v*) echo "OK: real publish from tag '$REF_NAME'." ;;
            *)
              echo "::error::Tag '$REF_NAME' does not match the required 'v*' pattern."
              exit 1
              ;;
          esac

  validation:
    name: Run validation checks
    needs: guard
    uses: ./.github/workflows/pr-validation.yml

  publish:
    runs-on: ubuntu-24.04
    environment: publish
    name: Publish package to npm
    needs: [guard, validation]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Update npm to latest version
        run: npm install -g npm@latest

      - name: Cache node_modules
        uses: actions/cache@v5
        id: cache-node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: yarn install --frozen-lockfile --prefer-offline

      - name: Update versions
        run: yarn update-versions

      - name: Generate documentation (verification only)
        run: yarn doc-gen

      - name: Build package
        run: yarn build

      - name: Verify build outputs
        run: |
          echo "Checking dist directory..."
          ls -la dist/
          echo "Checking package files..."
          npm pack --dry-run --ignore-scripts

      - name: Publish to npm (dry-run)
        if: ${{ inputs.dry-run == 'true' }}
        env:
          NPM_DIST_TAG: ${{ inputs.tag }}
        run: npm publish --provenance --tag "$NPM_DIST_TAG" --dry-run --ignore-scripts

      - name: Publish to npm
        if: ${{ inputs.dry-run != 'true' }}
        env:
          NPM_DIST_TAG: ${{ inputs.tag }}
        run: npm publish --provenance --tag "$NPM_DIST_TAG" --ignore-scripts

      - name: Output published version
        if: ${{ inputs.dry-run != 'true' }}
        env:
          NPM_DIST_TAG: ${{ inputs.tag }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "✅ Successfully published react-native-adapty@${PACKAGE_VERSION} (tag: ${NPM_DIST_TAG})"
          echo "📦 Package URL: https://www.npmjs.com/package/react-native-adapty/v/${PACKAGE_VERSION}"
